name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android platform packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename debug APK
        run: cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/DragonBallScouter-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DragonBallScouter-debug-apk
          path: app/build/outputs/apk/debug/DragonBallScouter-debug.apk
          if-no-files-found: error
